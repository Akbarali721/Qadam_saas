<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sherigingizni taklif qiling — Munosabat testi</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/love.css" />
  </head>
  <body data-page="share" class="app-body app-body--onboarding love-body">
    <main class="love-shell">
      <div class="love-card share-step">
        <div class="share-step__icon" aria-hidden="true">💌</div>
        <h1 class="love-title">Sherigingizni taklif qiling</h1>
        <p class="love-subtitle">
          Siz testni yakunladingiz. Endi sherigingiz ham testdan o‘tsa, umumiy natija tayyorlanadi.
        </p>
        <input
          id="partner-link"
          type="hidden"
          value="{{ bot_invite_link }}"
          data-token="{{ token }}"
        />
        <div class="love-actions">
          <button
            id="telegram-share-btn"
            class="love-btn love-btn--primary"
            type="button"
            data-share-url="{{ telegram_share_url }}"
          >
            📨 Telegram orqali yuborish
          </button>
          <button id="copy-partner-link" class="love-btn love-btn--secondary" type="button">
            🔗 Havolani nusxalash
          </button>
        </div>
        <p class="share-info-text">
          Sherigingiz testni yakunlagach, natija sizga Telegram orqali yuboriladi.
        </p>
        <p id="message" class="form-message" role="alert"></p>
      </div>
    </main>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/app.js?v=2"></script>
  </body>
</html>
