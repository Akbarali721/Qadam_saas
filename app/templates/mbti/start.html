<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MBTI testi - Qadam</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      .mbti-shell { max-width: 720px; margin: 0 auto; padding: 40px 16px; }
      .mbti-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 20px 45px rgb(15 23 42 / 0.08);
      }
      .mbti-kicker { color: #4f46e5; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
      .mbti-title { margin: 8px 0 12px; font-size: clamp(2rem, 5vw, 3rem); }
      .mbti-lead { color: #64748b; font-size: 1.05rem; }
      .mbti-list { margin: 22px 0; padding-left: 20px; color: #334155; }
      .mbti-time { margin: 12px 0 0; text-align: center; color: #64748b; font-size: .95rem; }
      .mbti-btn {
        display: inline-block;
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 14px 18px;
        background: #4f46e5;
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="mbti-shell">
      <section class="mbti-card">
        <p class="mbti-kicker">Qadam MBTI</p>
        <h1 class="mbti-title">Siz aslida qanday odamsiz?</h1>
        <p class="mbti-lead">
          10 ta qisqa savol orqali:
        </p>
        <ul class="mbti-list">
          <li>Sizning kuchli tomonlaringiz</li>
          <li>Qaysi kasb sizga mos</li>
          <li>Qanday qaror qabul qilasiz</li>
        </ul>
        <p class="mbti-lead">
          Natijada siz haqingizda aniq va tushunarli tavsif chiqadi.
        </p>
        <form method="post" action="/mbti/start">
          <button class="mbti-btn" type="submit">👉 Natijani bilish</button>
        </form>
        <p class="mbti-time">⏱ 2 daqiqa vaqt oladi</p>
      </section>
    </main>
  </body>
</html>
