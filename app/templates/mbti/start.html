<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MBTI testi - Qadam</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="qadam-intro-body qadam-intro-body--mbti">
    <main class="qadam-intro-shell">
      <section class="qadam-intro-card qadam-intro-card--banner" aria-label="MBTI testi">
        <div class="brand-banner">
          <img src="/static/img/qadam-banner.png" alt="Qadam banner">
        </div>
        <div class="content-section">
        <header class="qadam-intro-header">
          <p class="qadam-intro-kicker">QADAM MBTI</p>
          <h1 class="qadam-intro-title">Nega ba’zi qarorlarni boshqalar kabi qabul qilmaysiz?</h1>
          <p class="qadam-intro-lead">
            10 ta qisqa savol orqali xarakteringiz, fikrlash uslubingiz va kuchli tomonlaringiz
            haqida aniqroq tasavvur olasiz.
          </p>
        </header>

        <ul class="qadam-intro-benefits" aria-label="Nima bilib olasiz">
          <li class="qadam-intro-benefit">
            <span class="qadam-intro-benefit__icon" aria-hidden="true"></span>
            <span>Qanday fikrlashingiz</span>
          </li>
          <li class="qadam-intro-benefit">
            <span class="qadam-intro-benefit__icon" aria-hidden="true"></span>
            <span>Kuchli tomonlaringiz</span>
          </li>
          <li class="qadam-intro-benefit">
            <span class="qadam-intro-benefit__icon" aria-hidden="true"></span>
            <span>Sizga mos faoliyat uslubi</span>
          </li>
        </ul>

        <div class="qadam-intro-cta">
          <form class="qadam-intro-form" method="post" action="/mbti/start">
            <button class="qadam-intro-btn" type="submit">Xarakterimni bilish →</button>
          </form>
          <p class="qadam-intro-note">Taxminan 2 daqiqa vaqt oladi.</p>
        </div>
        </div>
      </section>
    </main>
  </body>
</html>
