<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sherigingizni taklif qiling — Munosabat testi</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/love.css" />
  </head>
  <body data-page="share" class="app-body app-body--onboarding love-body">
    <main class="love-shell">
      <div class="love-card share-step">
        <div class="share-step__icon" aria-hidden="true">💌</div>
        <h1 class="love-title">Sherigingizni taklif qiling</h1>
        <p class="love-subtitle">
          Siz testni yakunladingiz. Endi sherigingiz ham testdan o‘tsa, umumiy natija tayyorlanadi.
        </p>
        <input
          id="partner-link"
          type="hidden"
          value="{{ bot_invite_link }}"
          data-token="{{ token }}"
        />
        <div class="love-actions">
          <a
            id="telegram-share-btn"
            class="love-btn love-btn--primary"
            href="{{ telegram_share_url }}"
            target="_blank"
            rel="noopener noreferrer"
          >
            📨 Telegram orqali yuborish
          </a>
          <button id="copy-partner-link" class="love-btn love-btn--secondary" type="button">
            🔗 Havolani nusxalash
          </button>
        </div>
        <p class="share-info-text">
          Sherigingiz testni yakunlagach, natija sizga Telegram orqali yuboriladi.
        </p>
        <p id="message" class="form-message" role="alert"></p>
      </div>
    </main>
    <script>
      const inviteLink = document.getElementById("partner-link")?.value || "";
      const sessionToken = document.getElementById("partner-link")?.dataset.token || "";
      const msg = document.getElementById("message");

      async function copyInviteLink() {
        if (!inviteLink) {
          if (msg) msg.textContent = "Taklif havolasi tayyor emas.";
          return;
        }
        try {
          await navigator.clipboard.writeText(inviteLink);
          if (msg) msg.textContent = "Havola nusxalandi.";
        } catch {
          if (msg) msg.textContent = "Nusxalab bo‘lmadi.";
        }
      }

      async function trackInviteShareClick() {
        if (!sessionToken) return;
        try {
          await fetch(`/api/sessions/${encodeURIComponent(sessionToken)}/events/invite-share`, {
            method: "POST",
          });
        } catch {
          // Analytics should not block sharing.
        }
      }

      document.getElementById("copy-partner-link")?.addEventListener("click", copyInviteLink);
      document.getElementById("telegram-share-btn")?.addEventListener("click", () => {
        trackInviteShareClick();
      });
    </script>
  </body>
</html>
